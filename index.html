<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Milräknaren</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Milräknaren">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --text: #e6edf3;
    --muted: #8b949e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .container {
    width: 100%;
    max-width: 380px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    background: linear-gradient(135deg, var(--accent), #a5d6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 28px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
  }

  .date-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .date-row label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  input[type="date"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
    color-scheme: dark;
  }

  input[type="date"]:focus {
    border-color: var(--accent);
  }

  .today-btn {
    background: var(--border);
    border: none;
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 10px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .today-btn:active { background: var(--accent); color: #000; }

  .big-number {
    font-size: 3.5rem;
    font-weight: 500;
    line-height: 1;
    margin: 8px 0 4px;
    letter-spacing: -0.03em;
  }

  .big-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }

  .bar-wrap {
    background: var(--bg);
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s ease, background 0.3s;
  }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: var(--muted);
  }

  .stat {
    background: var(--bg);
    border-radius: 8px;
    padding: 12px;
  }

  .stat-val {
    font-size: 1.3rem;
    font-weight: 500;
  }

  .stat-lbl {
    font-size: 0.62rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 3px;
  }

  .outside-range {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 0.85rem;
  }

  .timeline-label {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Milräknaren</h1>
  <p class="subtitle">3 000 mil · 3 år · från 16 feb 2026</p>

  <div class="card">
    <div class="date-row">
      <label>Datum</label>
      <input type="date" id="datePicker">
      <button class="today-btn" onclick="setToday()">Idag</button>
    </div>
  </div>

  <div id="result"></div>
</div>

<script>
  const START = new Date('2026-02-16');
  const END   = new Date('2029-02-16');
  const TOTAL_MIL = 3000;
  const TOTAL_DAYS = (END - START) / 86400000;

  function setToday() {
    const today = new Date();
    document.getElementById('datePicker').value = today.toISOString().split('T')[0];
    calculate();
  }

  function fmt1(n) { return n.toFixed(1); }

  function calculate() {
    const val = document.getElementById('datePicker').value;
    if (!val) return;

    const picked = new Date(val + 'T12:00:00');
    const el = document.getElementById('result');

    if (picked < START || picked > END) {
      el.innerHTML = `<div class="card outside-range">
        Välj ett datum mellan<br>16 feb 2026 – 16 feb 2029
      </div>`;
      return;
    }

    const daysPassed = (picked - START) / 86400000;
    const daysLeft   = TOTAL_DAYS - daysPassed;
    const target     = (daysPassed / TOTAL_DAYS) * TOTAL_MIL;
    const pct        = (daysPassed / TOTAL_DAYS) * 100;
    const weeksLeft  = daysLeft / 7;
    const milPerWeekNeeded = (TOTAL_MIL - target) / weeksLeft;

    const barColor = pct < 33 ? 'var(--accent)' : pct < 66 ? 'var(--green)' : 'var(--orange)';

    el.innerHTML = `
    <div class="card">
      <div class="big-label">Du borde ha kört</div>
      <div class="big-number" style="color:${barColor}">${fmt1(target)}</div>
      <div class="big-label">mil av 3 000</div>

      <div class="bar-wrap">
        <div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${barColor}"></div>
      </div>
      <div class="bar-labels">
        <span>start</span>
        <span>${pct.toFixed(1)}% av avtalet</span>
        <span>slut</span>
      </div>

      <div style="margin-top:12px">
        <div class="stat">
          <div class="stat-val">${fmt1(milPerWeekNeeded)}</div>
          <div class="stat-lbl">Mil/vecka kvar att hålla</div>
        </div>
      </div>
    </div>
    <p class="timeline-label">Avtalet löper ut 16 feb 2029</p>
    `;
  }

  document.getElementById('datePicker').addEventListener('change', calculate);
  setToday();
</script>
</body>
</html>
